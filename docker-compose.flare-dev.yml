# Flare-dev override for the generic ./docker-compose.yml.
#
# Layers the Flare-specific topology on top of the generic stack:
#   - the adapter loads the real fleet roster from the connector
#     (dispatch-cc-consumer) running on the host (http://host.docker.internal:3002)
#   - it publishes the platform's canonical telemetry envelope (Confluent-AVRO)
#     to a Redpanda cluster on topic `telemetry.device.*`.
#
#   docker compose -f docker-compose.yml -f docker-compose.flare-dev.yml up -d --build
#
# Prerequisites:
#   - The connector (dispatch-cc-consumer) running on the host on :3002.
#   - For the LOCAL sink (active below): the system-plane `suite_redpanda` broker
#     reachable over the external `suite_network`.
#   - For the DEV sink (commented out): on the office VPN, with the dev Redpanda
#     certs at "~/Projects/flare/certificates/redpanda dev" and REDPANDA_PASSWORD
#     set in ./.env, and the `telemetry.device.clean` topic created on the broker.
name: moveet

services:
  adapter:
    environment:
      # Real fleet: the generic "rest" source pulls the connector's fleet-roster
      # and GROUPS assignments by vehicleId → one simulated entity per vehicle,
      # with its device(s) in metadata.devices[] ({id:deviceId, deviceType}). The
      # sink fans those out, co-located at the vehicle's position (no jumping).
      # The connector (dispatch-cc-consumer) runs on the HOST, reached via
      # host.docker.internal (mapped to host-gateway below).
      SOURCE_TYPE: rest
      SOURCE_CONFIG: '{"url":"http://host.docker.internal:3002/api/fleet/roster","vehiclePath":"assignments","groupBy":"vehicleId","fieldMap":{"id":"deviceId"},"metadataMap":{"deviceType":"deviceType"},"limit":100}'
      SINK_TYPES: redpanda,console
      SINK_CONSOLE_CONFIG: '{"verbose":false}'
      # --- DEV Redpanda sink (DISABLED). Publishes the platform's canonical
      # telemetry envelope (Confluent-AVRO, registered in the dev Schema Registry)
      # to topic `telemetry.device.clean` on the dev broker. fanOut emits one
      # message per device in metadata.devices[], keyed by the real deviceId
      # (device.id). The dev broker requires mutual-TLS (certs at /certs) +
      # SASL/SCRAM-512; the registry is HTTPS and shares the same client certs.
      # The SCRAM password is interpolated from ./.env (REDPANDA_PASSWORD).
      # Re-enable this line (and comment out the LOCAL one below) to publish to
      # dev — requires the office VPN and the extra_hosts pin below.
      # SINK_REDPANDA_CONFIG: '{"brokers":"rp1.redpanda.flare-dev:9093","topic":"telemetry.device.clean","format":"canonical-avro","schemaRegistryUrl":"https://rp1.redpanda.flare-dev:8083","keyField":"device.id","fanOut":"metadata.devices","sourceService":"moveet-simulator","sourceEnvironment":"dev","tlsCa":"/certs/ca","tlsCert":"/certs/crt","tlsKey":"/certs/key","saslMechanism":"scram-sha-512","saslUsername":"flare-cc","saslPassword":"${REDPANDA_PASSWORD}"}'
      # --- LOCAL Redpanda sink (ACTIVE). Publishes to the system-plane
      # `suite_redpanda` broker over the shared `suite_network` (plaintext, no
      # auth), so the locally-running connector consumes it. Internal addresses
      # (suite_redpanda:9092 / :8081) are required because the broker advertises
      # its external listener as `localhost:19092`, unreachable from another
      # container — hence the adapter joins `suite_network` (see networks: below).
      SINK_REDPANDA_CONFIG: '{"brokers":"suite_redpanda:9092","topic":"telemetry.device.raw","format":"canonical-avro","schemaRegistryUrl":"http://suite_redpanda:8081","keyField":"device.id","fanOut":"metadata.devices","sourceService":"moveet-simulator","sourceEnvironment":"local"}'
    networks:
      # `default` keeps adapter<->simulator/ui reachable by service name.
      - default
      # `suite_network` is system-plane's broker network, so the adapter can
      # resolve suite_redpanda:9092 / :8081 for the LOCAL sink above.
      - suite_network
    volumes:
      # Dev Redpanda client certs (ca/crt/key), read-only. The space in the dir
      # name is fine inside the quoted source path. Only needed for the DEV sink.
      - "${HOME}/Projects/flare/certificates/redpanda dev:/certs:ro"
    extra_hosts:
      # The dev broker + registry resolve to a VPN-internal IP that Docker's DNS
      # can't see; pin the hostname so the TLS cert (CN/SAN) still validates.
      # (Only relevant when the DEV sink above is enabled.)
      - "rp1.redpanda.flare-dev:10.1.3.40"
      # Reach connector + other services running on the host.
      - "host.docker.internal:host-gateway"

  simulator:
    environment:
      # Drive the real fleet roster off the adapter rather than synthetic vehicles.
      UPDATE_INTERVAL: "1000"
      VEHICLE_COUNT: "30"

# The external system-plane broker network the adapter joins for the LOCAL sink.
networks:
  suite_network:
    external: true
