name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Node is pinned to 26 to match .node-version, the root package.json engines,
# and every Dockerfile (node:26-alpine). better-sqlite3 is a native module that
# is rebuilt from source on `npm ci`, so the running Node major must stay aligned
# with these pins to avoid a NODE_MODULE_VERSION (ABI) mismatch at test time.
env:
  NODE_VERSION: 26

jobs:
  # Lint, type-check, test and build run through a single topological, cached
  # turbo invocation. Each job does its own `npm ci` (npm's own download cache is
  # restored by setup-node) so there is never a "cache-miss with no install"
  # failure, and better-sqlite3 is always built against this job's Node.
  verify:
    name: Lint / type-check / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Cache the turbo task results across runs. Keyed on the lockfile + all
      # source/config so an unchanged tree is a hit; restore-keys lets a partial
      # tree change reuse the most recent prior cache instead of starting cold.
      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('package-lock.json', 'turbo.json', 'apps/**/src/**', 'packages/**/src/**', 'apps/**/*.json', 'packages/**/*.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Lint, type-check, test, build
        run: npx turbo lint type-check test:ci build
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            apps/simulator/coverage/
            apps/adapter/coverage/
            apps/ui/coverage/
            apps/network/coverage/
          retention-days: 14

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run format:check

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Single workspaces-aware audit from the root covers every app + package.
      #
      # Gate on high: highs are within scope of our threat model (e.g. ws powers
      # the simulator WebSocket server). Keep the tree clean of high and critical
      # advisories; resolve new ones via npm audit fix or a safe dependency bump.
      - name: Audit (root + all workspaces)
        run: npm audit --audit-level=high
