# Local-from-source Moveet stack, wired to the trajectory-engine integration.
#
# Builds the monorepo (workspace-aware, see ./Dockerfile) and joins the shared
# `suite_redpanda` broker so the simulator's telemetry feeds the trajectory
# engine on topic `trajectory.telemetry.raw`.
#
#   docker compose up -d --build     # build images + start the whole stack
#   docker compose logs -f           # follow logs
#   docker compose down              # stop everything
#
# After it's up, start the simulation loop (it boots paused):
#   curl -XPOST localhost:5010/start -H 'content-type: application/json' -d '{}'
#
# UI:        http://localhost:5012
# Simulator: http://localhost:5010   Adapter: http://localhost:5011
#
# Requires the external `suite_network` (the shared suite dev stack) to exist.
name: moveet

services:
  adapter:
    build:
      context: .
      target: adapter
    environment:
      PORT: "5011"
      CORS_ORIGINS: "*"
      SOURCE_TYPE: static
      SOURCE_CONFIG: '{"count":30}'
      SINK_TYPES: redpanda,console
      SINK_CONSOLE_CONFIG: '{"verbose":false}'
      # Publishes the engine's pure-GPS schema to its input topic on the shared
      # broker (internal listener). Flip format to "dispatch" for moveet's
      # native event shape, or swap SOURCE_TYPE to "connector" for the real fleet.
      SINK_REDPANDA_CONFIG: '{"brokers":"suite_redpanda:9092","topic":"trajectory.telemetry.raw","format":"trajectory","defaultAltitude":1650,"defaultAccuracy":5}'
    ports:
      - "5011:5011"
    networks:
      - suite_network

  simulator:
    build:
      context: .
      target: simulator
    depends_on:
      - adapter
    environment:
      PORT: "3000"
      UPDATE_INTERVAL: "1000"
      VEHICLE_COUNT: "30"
      ADAPTER_URL: http://adapter:5011
      GEOJSON_PATH: /data/network.geojson
    volumes:
      # The persisted Nairobi network (data/* is gitignored, generated by
      # `apps/network`). Swap this file to drive a different city.
      - ./apps/simulator/data/network.geojson:/data/network.geojson:ro
    ports:
      - "5010:3000"
    networks:
      - suite_network

  ui:
    build:
      context: .
      target: ui
    ports:
      - "5012:8080"
    networks:
      - suite_network

networks:
  suite_network:
    external: true
