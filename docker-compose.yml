# Local-from-source Moveet stack, wired to the trajectory-engine integration.
#
# Builds the monorepo (workspace-aware, see ./Dockerfile) and joins the shared
# `suite_redpanda` broker so the simulator's telemetry feeds the trajectory
# engine on topic `trajectory.telemetry.raw`.
#
#   docker compose up -d --build     # build images + start the whole stack
#   docker compose logs -f           # follow logs
#   docker compose down              # stop everything
#
# After it's up, start the simulation loop (it boots paused):
#   curl -XPOST localhost:5010/start -H 'content-type: application/json' -d '{}'
#
# UI:        http://localhost:5012
# Simulator: http://localhost:5010   Adapter: http://localhost:5011
#
# Requires the external `suite_network` (the shared suite dev stack) to exist.
name: moveet

services:
  adapter:
    build:
      context: .
      target: adapter
    environment:
      PORT: "5011"
      CORS_ORIGINS: "*"
      # Real fleet: the generic "rest" source pulls the connector's fleet-roster
      # and GROUPS assignments by vehicleId → one simulated entity per vehicle,
      # with its device(s) in metadata.devices[] ({id:deviceId, deviceType}). The
      # sink fans those out, co-located at the vehicle's position (no jumping).
      # (Use SOURCE_TYPE: static + SOURCE_CONFIG '{"count":N}' for synthetic.)
      SOURCE_TYPE: rest
      SOURCE_CONFIG: '{"url":"http://suite_connector:3002/api/fleet/roster","vehiclePath":"assignments","groupBy":"vehicleId","fieldMap":{"id":"deviceId"},"metadataMap":{"deviceType":"deviceType"},"limit":100}'
      SINK_TYPES: redpanda,console
      SINK_CONSOLE_CONFIG: '{"verbose":false}'
      # Publishes the engine's pure-GPS schema to its input topic on the shared
      # broker. fanOut emits one message per device in metadata.devices[], all at
      # the vehicle's shared position, keyed by the real deviceId (device.id).
      SINK_REDPANDA_CONFIG: '{"brokers":"suite_redpanda:9092","topic":"trajectory.telemetry.raw","keyField":"device.id","defaultAltitude":1650,"defaultAccuracy":5,"fanOut":"metadata.devices","payloadTemplate":{"ts":"ts","deviceId":"device.id","deviceType":"device.deviceType","lat":"lat","lon":"lon","speed":"speed","heading":"heading","altitude":"altitude","accuracy":"accuracy","ignition":"ignition"}}'
      # Telemetry realism (off by default): correlated GPS noise + connectivity
      # dropouts (store-and-forward) + jittered cadence, applied to all sinks.
      # REALISM_CONFIG: '{"enabled":true,"reportingPeriodMs":5000,"jitterMs":800}'
    ports:
      - "5011:5011"
    networks:
      - suite_network

  simulator:
    build:
      context: .
      target: simulator
    depends_on:
      - adapter
    environment:
      PORT: "3000"
      UPDATE_INTERVAL: "1000"
      VEHICLE_COUNT: "30"
      ADAPTER_URL: http://adapter:5011
      GEOJSON_PATH: /data/network.geojson
      # Persistence indexes recordings (SQLite) so generated ones get a stable
      # id — required for the "Emit to sinks" action, which downloads by id.
      # (db is container-local; recordings are regenerated after a recreate.)
      PERSISTENCE_ENABLED: "true"
      STATE_DB_PATH: /data/moveet.db
    volumes:
      # The persisted Nairobi network (data/* is gitignored, generated by
      # `apps/network`). Swap this file to drive a different city.
      - ./apps/simulator/data/network.geojson:/data/network.geojson:ro
    ports:
      - "5010:3000"
    networks:
      - suite_network

  ui:
    build:
      context: .
      target: ui
    ports:
      - "5012:8080"
    networks:
      - suite_network

networks:
  suite_network:
    external: true
